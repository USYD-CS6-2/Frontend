<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>CMU-Q Scraper</title>
    <style>
      body { 
        width: 250px; 
        padding: 15px; 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        background-color: #f4f4f4;
      }
      h3 { color: #800000; margin-top: 0; text-align: center; }
      button { 
        width: 100%; 
        padding: 12px; 
        cursor: pointer; 
        background: #800000; 
        color: white; 
        border: none; 
        border-radius: 5px;
        font-weight: bold;
        transition: background 0.3s;
      }
      button:hover { background: #a00000; }
      #status { 
        margin-top: 15px; 
        font-size: 13px; 
        color: #333; 
        padding: 8px;
        background: white;
        border-radius: 4px;
        border: 1px solid #ddd;
        min-height: 40px;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <h3>CMU-Q Scraper</h3>
    <button id="scrapeBtn">Scraping</button>
    <div id="status">Waiting...</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
